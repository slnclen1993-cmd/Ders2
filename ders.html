<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="denemediv"></div>
    <script>
        const denemedivi =document.getElementById("denemediv");
        const x = 78;
        const y = 10;
        let kalan = Math.ceil(x / y);

        for(let i = 1; i <= kalan; i++){
            denemedivi.innerHTML += "<button>" + i + "</button>";
        }
    </script>
</body>
</html>
